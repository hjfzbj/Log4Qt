logpath=.

reset=true
status=WARN
threshold=NULL
handleQtMessages=true
watchThisFile=false

# Global HeaderFooterProvider — application-defined class registered in
# main.cpp before the config is loaded. The serial number is injected by
# the application after loading (read from hardware in a real application).
headerFooterProvider.type=SerialNumberHeaderProvider

appender.console.type=Console
appender.console.target=STDOUT_TARGET
appender.console.threshold=ALL
appender.console.layout.type=TTCCLayout
appender.console.layout.dateFormat=dd.MM.yyyy hh:mm:ss.zzz
appender.console.layout.contextPrinting=true

appender.daily.type=DailyFile
appender.daily.file=${logpath}/propertyconfigurator.log
appender.daily.appendFile=true
appender.daily.datePattern=_yyyy_MM_dd
appender.daily.keepDays=90
appender.daily.layout.type=TTCCLayout
appender.daily.layout.dateFormat=dd.MM.yyyy hh:mm:ss.zzz
appender.daily.layout.contextPrinting=true

# JSON file appender — application-defined JsonSerialNumberHeaderProvider
# produces machine-readable header/footer.
# headerPattern / footerPattern are configured here via Q_PROPERTY; the
# serial number is injected by the application via the factory lambda so it
# is available at file-open time through %P{serialNumber}.
appender.json.type=DailyFile
appender.json.file=${logpath}/propertyconfigurator.json
appender.json.appendFile=true
appender.json.layout.type=JsonLayout
appender.json.layout.headerFooterProvider.type=JsonSerialNumberHeaderProvider
appender.json.layout.headerFooterProvider.headerPattern={"event":"start","serialNumber":"%P{serialNumber}","time":"%d{yyyy-MM-ddTHH:mm:ss}"}
appender.json.layout.headerFooterProvider.footerPattern={"event":"end","serialNumber":"%P{serialNumber}","time":"%d{yyyy-MM-ddTHH:mm:ss}"}

rootLogger.level=ALL
rootLogger.appenderRef.console.ref=console
rootLogger.appenderRef.daily.ref=daily
rootLogger.appenderRef.json.ref=json

logger.LoggerObjectPrio.name=LoggerObjectPrio
logger.LoggerObjectPrio.level=ERROR
logger.LoggerObjectPrio.additivity=false
logger.LoggerObjectPrio.appenderRef.daily.ref=daily
logger.LoggerObjectPrio.appenderRef.console.ref=console
